<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varshini.S — About Me</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700;900&family=Great+Vibes&family=Rajdhani:wght@400;600;700&display=swap');
:root {
  --pink:#ff2d78;--hotpink:#ff69b4;--rose:#ff0055;
  --black:#0a0008;--dark:#130010;--card:#1a0015;
  --cyber:#00ffe7;--cyberglow:#00bfff;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:#fff;font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 20%,rgba(255,0,85,0.08) 0%,transparent 70%),radial-gradient(ellipse 50% 50% at 80% 80%,rgba(255,45,120,0.07) 0%,transparent 70%);pointer-events:none;z-index:1;}
#web{position:fixed;inset:0;z-index:0;pointer-events:none;}
.page{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;padding:50px 20px 100px;gap:32px;}
.name-wrap{text-align:center;}
.name-row{font-family:'Great Vibes',cursive;font-size:clamp(3rem,10vw,6rem);font-weight:400;line-height:1.1;letter-spacing:4px;}
.name-row .letter{display:inline-block;opacity:0;color:#fff;text-shadow:0 0 8px var(--pink),0 0 25px var(--rose),0 0 60px var(--rose),0 0 100px #ff004488;animation:dropIn 0.55s cubic-bezier(.22,1,.36,1) forwards;}
@keyframes dropIn{from{opacity:0;transform:translateY(-50px) scale(0.3);filter:blur(8px);}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0);}}
.subtitle{font-family:'Dancing Script',cursive;font-size:clamp(0.9rem,2.5vw,1.3rem);letter-spacing:3px;color:var(--hotpink);text-shadow:0 0 14px var(--pink),0 0 35px var(--rose);margin-top:6px;opacity:0;animation:fadeUp 1s 2.6s forwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* Profile Photo */
.profile-wrap{position:relative;width:min(200px,50vw);aspect-ratio:1;opacity:0;transform:scale(0.7) translateY(20px);transition:opacity 0.8s cubic-bezier(.22,1,.36,1),transform 0.8s cubic-bezier(.22,1,.36,1);}
.profile-wrap.visible{opacity:1;transform:scale(1) translateY(0);}
.profile-wrap img{width:100%;height:100%;object-fit:cover;border-radius:50%;border:3px solid var(--pink);box-shadow:0 0 18px var(--pink),0 0 40px var(--rose),0 0 80px #ff005530;display:block;}
.profile-ring{position:absolute;inset:-8px;border-radius:50%;border:2px dashed var(--hotpink);animation:spin 12s linear infinite;opacity:0.5;}
@keyframes spin{to{transform:rotate(360deg);}}

.section-label{font-family:'Dancing Script',cursive;font-size:clamp(1rem,3vw,1.4rem);letter-spacing:3px;color:var(--hotpink);text-shadow:0 0 10px var(--pink),0 0 25px var(--rose);text-align:center;opacity:0;transform:translateY(20px);transition:opacity 0.6s,transform 0.6s;}
.section-label.visible{opacity:1;transform:translateY(0);}
.heart-wrap{position:relative;width:min(420px,90vw);display:flex;justify-content:center;align-items:center;opacity:0;transform:scale(0.55) translateY(40px);transition:opacity 0.7s cubic-bezier(.22,1,.36,1),transform 0.7s cubic-bezier(.22,1,.36,1);}
.heart-wrap.visible{opacity:1;transform:scale(1) translateY(0);}
.heart-svg{width:100%;filter:drop-shadow(0 0 10px var(--pink)) drop-shadow(0 0 30px var(--rose)) drop-shadow(0 0 65px #ff005540);transition:filter 0.4s;}
.heart-wrap:hover .heart-svg{filter:drop-shadow(0 0 20px var(--hotpink)) drop-shadow(0 0 55px var(--pink)) drop-shadow(0 0 110px var(--rose));}
.heart-content{position:absolute;top:50%;left:50%;transform:translate(-50%,-53%);width:62%;text-align:center;pointer-events:none;}
.h-icon{font-size:clamp(1.2rem,4vw,1.8rem);margin-bottom:3px;}
.h-label{font-family:'Dancing Script',cursive;font-size:clamp(0.7rem,2vw,0.95rem);letter-spacing:2px;color:var(--hotpink);text-shadow:0 0 8px var(--pink);margin-bottom:4px;}
.h-value{font-family:'Rajdhani',sans-serif;font-size:clamp(0.72rem,2.2vw,1rem);font-weight:700;color:#fff;line-height:1.4;text-shadow:0 0 10px rgba(255,45,120,0.6);}
.hobby-content{position:absolute;top:50%;left:50%;transform:translate(-50%,-53%);width:64%;text-align:center;pointer-events:none;}
.hobby-lines{display:flex;flex-direction:column;gap:2px;}
.hobby-line{font-family:'Rajdhani',sans-serif;font-size:clamp(0.6rem,1.7vw,0.82rem);font-weight:600;color:#fff;text-shadow:0 0 8px rgba(255,45,120,0.7);opacity:0;transform:translateY(10px);transition:opacity 0.5s,transform 0.5s;}
.heart-wrap.visible .hobby-line:nth-child(1){opacity:1;transform:translateY(0);transition-delay:0.3s}
.heart-wrap.visible .hobby-line:nth-child(2){opacity:1;transform:translateY(0);transition-delay:0.55s}
.heart-wrap.visible .hobby-line:nth-child(3){opacity:1;transform:translateY(0);transition-delay:0.8s}
.heart-wrap.visible .hobby-line:nth-child(4){opacity:1;transform:translateY(0);transition-delay:1.05s}

/* Photo cards */
.photo-card{position:relative;width:min(380px,90vw);opacity:0;transform:translateY(30px) scale(0.9);transition:opacity 0.8s,transform 0.8s;}
.photo-card.visible{opacity:1;transform:translateY(0) scale(1);}
.photo-card img{width:100%;border-radius:16px;border:2px solid var(--pink);box-shadow:0 0 20px var(--rose),0 0 50px #ff005520;display:block;}
.photo-caption{text-align:center;margin-top:10px;font-family:'Dancing Script',cursive;font-size:clamp(0.85rem,2.5vw,1.1rem);color:var(--hotpink);text-shadow:0 0 10px var(--pink);letter-spacing:2px;}

/* Dream */
.dream-section{width:min(460px,92vw);background:linear-gradient(135deg,#050020 0%,#0a0030 50%,#050020 100%);border:2px solid var(--cyber);border-radius:20px;padding:30px 24px;text-align:center;opacity:0;transform:translateY(40px);transition:opacity 1s,transform 1s;box-shadow:0 0 25px rgba(0,255,231,0.2),0 0 60px rgba(0,191,255,0.1),inset 0 0 30px rgba(0,255,231,0.03);position:relative;overflow:hidden;}
.dream-section::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,231,0.015) 2px,rgba(0,255,231,0.015) 4px);pointer-events:none;}
.dream-section.visible{opacity:1;transform:translateY(0);}
.dream-label{font-family:'Dancing Script',cursive;font-size:clamp(0.85rem,2.5vw,1.1rem);letter-spacing:4px;color:var(--cyber);text-shadow:0 0 10px var(--cyber),0 0 25px var(--cyberglow);margin-bottom:14px;text-transform:uppercase;}
.dream-title{font-family:'Great Vibes',cursive;font-size:clamp(2rem,7vw,3.2rem);color:#fff;text-shadow:0 0 12px var(--cyber),0 0 35px var(--cyberglow),0 0 70px rgba(0,255,231,0.4);line-height:1.2;margin-bottom:16px;}
.dream-icons{font-size:clamp(1.6rem,5vw,2.4rem);margin-bottom:14px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap;}
.dream-desc{font-family:'Rajdhani',sans-serif;font-size:clamp(0.82rem,2.2vw,1rem);font-weight:600;color:rgba(255,255,255,0.85);line-height:1.6;letter-spacing:1px;}
.cyber-tag{display:inline-block;margin-top:14px;padding:5px 16px;border:1px solid var(--cyber);border-radius:30px;font-family:'Rajdhani',sans-serif;font-size:clamp(0.7rem,1.8vw,0.85rem);font-weight:700;letter-spacing:3px;color:var(--cyber);text-shadow:0 0 8px var(--cyber);box-shadow:0 0 12px rgba(0,255,231,0.2);text-transform:uppercase;}
.blink{animation:blink 1.2s step-end infinite;color:var(--cyber);text-shadow:0 0 10px var(--cyber);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.promise{font-family:'Dancing Script',cursive;font-size:clamp(1.2rem,4vw,2rem);font-weight:700;letter-spacing:3px;text-align:center;color:#fff;text-shadow:0 0 10px var(--hotpink),0 0 30px var(--pink),0 0 70px var(--rose);opacity:0;transform:scale(0.8);transition:opacity 0.9s,transform 0.9s;}
.promise.visible{opacity:1;transform:scale(1);}
.big-heart{font-size:clamp(2.5rem,8vw,4rem);text-align:center;animation:pulse 1.1s ease-in-out infinite;text-shadow:0 0 20px var(--pink),0 0 60px var(--rose);opacity:0;transition:opacity 1s;}
.big-heart.visible{opacity:1;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}
.divider{width:min(300px,70vw);height:1px;background:linear-gradient(90deg,transparent,var(--pink),transparent);box-shadow:0 0 10px var(--pink);opacity:0;transition:opacity 0.8s;}
.divider.visible{opacity:1;}
.cyber-divider{width:min(300px,70vw);height:1px;background:linear-gradient(90deg,transparent,var(--cyber),transparent);box-shadow:0 0 10px var(--cyber);opacity:0;transition:opacity 0.8s;}
.cyber-divider.visible{opacity:1;}
</style>
</head>
